name: Code Checks

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: false

jobs:
  check:
    name: Format, Lint, Type Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282
        with:
          deno-version: v2.8

      - name: Install dependencies
        run: deno ci

      - name: Check formatting
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Type check
        run: deno check

      - name: Test
        run: deno test --allow-all --permit-no-files

  docs:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: "./docs/package-lock.json"

      - name: Build docs
        working-directory: ./docs
        run: npm ci && npm run build

      - name: Verify LLM artifacts
        run: |
          test -f docs/.vitepress/dist/llms.txt
          test -f docs/.vitepress/dist/llms-full.txt
          test -f docs/.vitepress/dist/guide/core/commands.md
